name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run build
      run: npm run build:production
      continue-on-error: true
      id: build_step

    - name: Notify on failure
      if: failure() || steps.build_step.outcome == 'failure'
      run: |
        echo "Build failed, triggering webhook"
        # In real scenario, this would send webhook, but for local testing, we'll handle differently